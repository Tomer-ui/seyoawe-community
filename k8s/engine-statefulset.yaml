apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: seyoawe-engine
  namespace: default
spec:
  serviceName: seyoawe-engine
  replicas: 1
  selector:
    matchLabels:
      app: seyoawe-engine
  template:
    metadata:
      labels:
        app: seyoawe-engine
    spec:
      containers:
        - name: engine
          # __DOCKERHUB_USERNAME__ and __VERSION__ are replaced by the CD pipeline
          # using envsubst before kubectl apply is run.
          image: __DOCKERHUB_USERNAME__/seyoawe-engine:__VERSION__
          ports:
            - containerPort: 8080

          volumeMounts:
            - name: progress-logs
              mountPath: /app/seyoawe-community/logs    # matches config.yaml directories.logs; persisted across pod restarts

          # The engine has no HTTP endpoint that returns 200 when idle (/poll returns
          # 404 when there are no pending workflows). Use tcpSocket probes instead —
          # they succeed as soon as the engine process is listening on port 8080,
          # which is the correct signal that the engine is alive and ready.
          startupProbe:
            tcpSocket:
              port: 8080
            failureThreshold: 60   # 60 × 10s = 600s max startup window
            periodSeconds: 10

          livenessProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 10
            failureThreshold: 3

      volumes:
        - name: progress-logs
          persistentVolumeClaim:
            claimName: engine-progress-logs
