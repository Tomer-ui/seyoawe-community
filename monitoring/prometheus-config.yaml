# Prometheus scrape configuration — stored as a ConfigMap and mounted
# into the Prometheus pod at /etc/prometheus/prometheus.yml.
#
# What it scrapes:
#   1. Prometheus itself (self-monitoring)
#   2. cAdvisor via kubelet (container CPU, memory, network, disk)
#   3. Kubelet metrics (node-level stats)
#   4. Any pod with prometheus.io/scrape=true annotation (future-proof)
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:

      # ── 1. Prometheus self-metrics ──────────────────────────────────────
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]

      # ── 2. cAdvisor (container-level metrics) ──────────────────────────
      # Proxied through the Kubernetes API → kubelet → cAdvisor.
      # Gives us: container_cpu_usage_seconds_total, container_memory_working_set_bytes,
      # container_network_receive_bytes_total, etc.
      - job_name: "kubernetes-cadvisor"
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor

      # ── 3. Kubelet metrics (node-level) ─────────────────────────────────
      - job_name: "kubernetes-nodes"
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics

      # ── 4. Pod annotation-based discovery ───────────────────────────────
      # Any pod with these annotations gets scraped automatically:
      #   prometheus.io/scrape: "true"
      #   prometheus.io/port: "8080"       (optional, defaults to pod port)
      #   prometheus.io/path: "/metrics"   (optional, defaults to /metrics)
      - job_name: "kubernetes-pods"
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
