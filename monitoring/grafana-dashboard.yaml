# Pre-built Grafana dashboard — mounted into the Grafana pod so it
# appears automatically on first boot. No manual import needed.
#
# Panels:
#   1. Container CPU Usage (by pod, default namespace)
#   2. Container Memory Usage (by pod, default namespace)
#   3. Network Received (by pod)
#   4. Network Transmitted (by pod)
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard
  namespace: monitoring
data:
  seyoawe-cluster.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Container CPU Usage (default namespace)",
          "type": "timeseries",
          "gridPos": { "h": 9, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"default\", container!=\"\", container!=\"POD\"}[5m])) by (pod)",
              "legendFormat": "{{ pod }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "lineWidth": 2, "fillOpacity": 15, "showPoints": "never" }
            },
            "overrides": []
          }
        },
        {
          "title": "Container Memory Usage (default namespace)",
          "type": "timeseries",
          "gridPos": { "h": 9, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"default\", container!=\"\", container!=\"POD\"}) by (pod)",
              "legendFormat": "{{ pod }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": { "lineWidth": 2, "fillOpacity": 15, "showPoints": "never" }
            },
            "overrides": []
          }
        },
        {
          "title": "Network Received (default namespace)",
          "type": "timeseries",
          "gridPos": { "h": 9, "w": 12, "x": 0, "y": 9 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "sum(rate(container_network_receive_bytes_total{namespace=\"default\"}[5m])) by (pod)",
              "legendFormat": "{{ pod }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": { "lineWidth": 2, "fillOpacity": 15, "showPoints": "never" }
            },
            "overrides": []
          }
        },
        {
          "title": "Network Transmitted (default namespace)",
          "type": "timeseries",
          "gridPos": { "h": 9, "w": 12, "x": 12, "y": 9 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "sum(rate(container_network_transmit_bytes_total{namespace=\"default\"}[5m])) by (pod)",
              "legendFormat": "{{ pod }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": { "lineWidth": 2, "fillOpacity": 15, "showPoints": "never" }
            },
            "overrides": []
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["seyoawe", "kubernetes"],
      "templating": { "list": [] },
      "time": { "from": "now-30m", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Seyoawe Cluster Overview",
      "uid": "seyoawe-overview"
    }
