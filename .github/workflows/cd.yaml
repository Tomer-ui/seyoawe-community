name: CD

# Triggered by the CI pipeline's version-and-release job after both images
# are pushed to Docker Hub. The version input carries the new tag (e.g. v0.0.2).
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to deploy (e.g. v0.0.2)"
        required: true
        type: string

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Provision the cluster, deploy the app, notify Slack on success.
  # Uploads terraform.tfstate as an artifact so the destroy job can use it
  # on a fresh runner without needing a remote backend.
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: "Provision → Deploy"
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION:    ${{ secrets.AWS_DEFAULT_REGION }}
      DOCKERHUB_USERNAME:    ${{ secrets.DOCKERHUB_USERNAME }}
      VERSION:               ${{ inputs.version }}
      TF_IN_AUTOMATION:      "1"

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      # ── Tool setup ────────────────────────────────────────────────────────

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Ansible
        run: pip install ansible

      # ── Terraform: provision VPC + EKS cluster ───────────────────────────

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Terraform plan
        working-directory: terraform
        run: terraform plan -out=tfplan

      - name: Terraform apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      # ── Ansible: configure cluster nodes ─────────────────────────────────

      - name: Configure EKS cluster nodes
        working-directory: ansible
        run: ansible-playbook playbooks/configure-nodes.yaml

      # ── Ansible: deploy the app ───────────────────────────────────────────

      - name: Deploy manifests to EKS
        working-directory: ansible
        run: ansible-playbook playbooks/deploy-manifests.yaml

      # ── Upload tfstate ────────────────────────────────────────────────────
      # Must run even on failure so the destroy job always has state to work
      # with. retention-days: 1 keeps costs negligible.

      - name: Upload terraform state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfstate
          path: terraform/terraform.tfstate
          retention-days: 1

      # ── Success notification ──────────────────────────────────────────────

      - name: Notify Slack — deploy succeeded
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          PAYLOAD=$(jq -n \
            --arg text "✅ *CD deploy succeeded*  version: \`${VERSION}\`\nRun: ${RUN_URL}" \
            '{"blocks": [{"type": "section", "text": {"type": "mrkdwn", "text": $text}}]}')
          curl -sf -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Approval gate — only runs when deploy succeeded.
  # The `environment: teardown` protection rule pauses execution here and
  # shows an Approve button in the GitHub Actions UI. Once clicked, the
  # destroy job is unblocked. If deploy failed this job is skipped entirely,
  # so the destroy job runs automatically without waiting for approval.
  # ─────────────────────────────────────────────────────────────────────────
  teardown-gate:
    name: "Waiting for teardown approval"
    runs-on: ubuntu-latest
    needs: deploy
    if: needs.deploy.result == 'success'
    environment: teardown

    steps:
      - name: Approved — proceeding to destroy
        run: echo "Teardown approved. Destroy job will now run."

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: Destroy — always cleans up the cluster.
  #
  # Runs when:
  #   a) deploy succeeded AND teardown-gate was approved  → user clicked the button
  #   b) deploy failed                                    → auto-cleanup, no button needed
  #
  # Downloads the tfstate artifact uploaded by the deploy job, re-initialises
  # Terraform (providers only, no new plan), then destroys everything.
  # ─────────────────────────────────────────────────────────────────────────
  destroy:
    name: "Destroy"
    runs-on: ubuntu-latest
    needs: [deploy, teardown-gate]
    if: |
      always() &&
      needs.deploy.result != 'skipped' &&
      (
        needs.teardown-gate.result == 'success' ||
        needs.deploy.result == 'failure'
      )

    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION:    ${{ secrets.AWS_DEFAULT_REGION }}
      VERSION:               ${{ inputs.version }}
      TF_IN_AUTOMATION:      "1"

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      # ── Tool setup ────────────────────────────────────────────────────────

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      # ── Restore tfstate from deploy job ──────────────────────────────────

      - name: Download terraform state
        uses: actions/download-artifact@v4
        with:
          name: tfstate
          path: terraform/

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      # ── Restore kubeconfig so kubectl can reach the cluster ───────────────
      # The destroy job runs on a fresh runner — kubeconfig must be rebuilt.
      # Cluster name is fixed (seyoawe-cluster); region comes from secrets.

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "$AWS_DEFAULT_REGION" \
            --name seyoawe-cluster || true

      # ── Pre-destroy: remove nginx NLB before terraform touches the VPC ────

      - name: Delete nginx ingress controller and wait for NLB to be deleted
        working-directory: terraform
        run: |
          kubectl delete namespace ingress-nginx --ignore-not-found || true
          kubectl delete namespace monitoring --ignore-not-found || true

          VPC_ID=$(terraform output -raw vpc_id 2>/dev/null || echo "")
          if [ -n "$VPC_ID" ]; then
            echo "Looking for load balancers in VPC $VPC_ID..."
            LB_ARNS=$(aws elbv2 describe-load-balancers \
              --query "LoadBalancers[?VpcId=='$VPC_ID'].LoadBalancerArn" \
              --output text 2>/dev/null || echo "")

            if [ -n "$LB_ARNS" ] && [ "$LB_ARNS" != "None" ]; then
              for ARN in $LB_ARNS; do
                echo "Waiting for load balancer to be deleted: $ARN"
                aws elbv2 wait load-balancer-deleted --load-balancer-arns "$ARN" \
                  || echo "  Wait timed out for $ARN — proceeding anyway"
              done
            else
              echo "No load balancers found in VPC $VPC_ID"
            fi
          fi

      # ── Terraform destroy ─────────────────────────────────────────────────

      - name: Terraform destroy
        working-directory: terraform
        run: terraform destroy -auto-approve

      # ── Cleanup artifact ─────────────────────────────────────────────────
      # Delete the tfstate artifact now that destroy is done — no reason to
      # keep it around until the 24h retention expires.

      - name: Delete tfstate artifact
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARTIFACT_ID=$(gh api repos/${{ github.repository }}/actions/artifacts \
            --jq '.artifacts[] | select(.name=="tfstate" and .expired==false) | .id' \
            | head -1)
          if [ -n "$ARTIFACT_ID" ]; then
            gh api --method DELETE repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID
            echo "Artifact $ARTIFACT_ID deleted"
          else
            echo "No tfstate artifact found"
          fi

      # ── Failure notifications ─────────────────────────────────────────────

      - name: Notify Slack — CD failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          PAYLOAD=$(jq -n \
            --arg text "❌ *CD pipeline failed*  version: \`${VERSION}\`\nRun: ${RUN_URL}" \
            '{"blocks": [{"type": "section", "text": {"type": "mrkdwn", "text": $text}}]}')
          curl -sf -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"

      - name: Create Jira bug — CD failure
        if: failure()
        env:
          JIRA_API_TOKEN:   ${{ secrets.JIRA_API_TOKEN }}
          JIRA_USER_EMAIL:  ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_BASE_URL:    ${{ secrets.JIRA_BASE_URL }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          PAYLOAD=$(jq -n \
            --arg project "$JIRA_PROJECT_KEY" \
            --arg summary "CD failure: deploy of ${VERSION} failed" \
            --arg description "CD pipeline failed for version ${VERSION}.\n\nRun: ${RUN_URL}" \
            '{
              "fields": {
                "project": {"key": $project},
                "summary": $summary,
                "description": {
                  "type": "doc",
                  "version": 1,
                  "content": [{
                    "type": "paragraph",
                    "content": [{"type": "text", "text": $description}]
                  }]
                },
                "issuetype": {"name": "Bug"}
              }
            }')
          AUTH=$(echo -n "${JIRA_USER_EMAIL}:${JIRA_API_TOKEN}" | base64 -w0)
          curl -sf -X POST \
            -H "Authorization: Basic ${AUTH}" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD" \
            "${JIRA_BASE_URL}/rest/api/3/issue"
